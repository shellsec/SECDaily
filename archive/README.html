<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="README - SECDaily">
    <meta name="keywords" content="安全资讯,网络安全,信息安全">
    <title>README - SECDaily</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --secondary: #06b6d4;
            --bg-page: #0f172a;
            --bg-page-mid: #1e293b;
            --bg-card: #ffffff;
            --bg-muted: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.08);
            --shadow-md: 0 4px 20px rgba(15, 23, 42, 0.12);
            --shadow-lg: 0 12px 40px rgba(15, 23, 42, 0.15);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 10px;
            --sidebar-width: 260px;
            --toc-width: 220px;
            --gap-section: 12px;
            --gap-card: 8px;
            --accent: #10b981;
            --glow-primary: rgba(14, 165, 233, 0.15);
            --glow-accent: rgba(16, 185, 129, 0.12);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-primary);
            background: linear-gradient(165deg, var(--bg-page) 0%, var(--bg-page-mid) 55%, #134e4a 100%);
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 12% 8%, var(--glow-primary) 0%, transparent 40%),
                radial-gradient(circle at 88% 92%, var(--glow-accent) 0%, transparent 36%),
                linear-gradient(rgba(148, 163, 184, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.04) 1px, transparent 1px);
            background-size: auto, auto, 24px 24px, 24px 24px;
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 16px 20px 28px;
            position: relative;
            z-index: 1;
        }

        body:has(.tag-cloud) .container,
        body:has(.ai-summary-panel) .container {
            padding-right: calc(var(--sidebar-width) + 28px);
        }
        
        .navigation {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 8px 14px;
            margin-bottom: var(--gap-section);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nav-brand {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #fff;
            background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
            padding: 4px 10px;
            border-radius: 999px;
            margin-right: 4px;
        }
        
        .navigation a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.82rem;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            transition: background 0.2s ease, color 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .navigation a.nav-back::before {
            content: '←';
            font-size: 1em;
        }
        
        .navigation a:hover {
            background: var(--bg-muted);
            color: var(--primary);
        }
        
        .navigation span {
            color: var(--border);
            user-select: none;
        }

        .navigation a.nav-external::after {
            content: '↗';
            font-size: 0.75em;
            opacity: 0.65;
        }

        .nav-search {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 180px;
            max-width: 320px;
            flex: 1;
            padding: 4px 8px;
            background: var(--bg-muted);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }

        .nav-search input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 0.82rem;
            color: var(--text-primary);
            outline: none;
            min-width: 0;
        }

        .nav-search button {
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 999px;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .main-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px 26px 24px;
            box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            position: relative;
        }
        
        .main-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        }
        
        .read-progress {
            position: absolute;
            top: 3px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--bg-muted);
            z-index: 2;
        }
        
        .read-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.1s linear;
        }
        
        .article-layout {
            display: grid;
            grid-template-columns: 1fr;
            column-gap: 16px;
            row-gap: 14px;
            align-items: start;
        }

        .article-layout.has-toc {
            grid-template-columns: var(--toc-width) minmax(0, 1fr);
        }

        .article-head {
            grid-column: 1 / -1;
        }

        .article-layout.has-toc .toc-panel {
            grid-column: 1;
            grid-row: 2;
        }

        .article-layout.has-toc .main-body {
            grid-column: 2;
            grid-row: 2;
        }

        .article-layout:not(.has-toc) .main-body {
            grid-column: 1;
            grid-row: 2;
        }
        
        .toc-panel {
            position: sticky;
            top: 16px;
            align-self: start;
            background: linear-gradient(180deg, #f8fafc 0%, #fff 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 10px;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
            box-shadow: var(--shadow-sm);
        }
        
        .toc-panel[hidden] { display: none !important; }
        
        .toc-head {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 0 0 8px;
            padding: 0 0 8px;
            border-bottom: 1px dashed var(--border);
            line-height: 1.3;
        }
        
        .toc-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        
        .toc-list a {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 5px 8px;
            border-radius: var(--radius-sm);
            border-left: 2px solid transparent;
            line-height: 1.35;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }
        
        .toc-list a:hover {
            color: var(--primary-dark);
            background: rgba(14, 165, 233, 0.08);
        }
        
        .toc-list a.is-active {
            color: var(--primary-dark);
            font-weight: 600;
            background: rgba(14, 165, 233, 0.1);
            border-left-color: var(--primary);
        }
        
        .main-body {
            min-width: 0;
        }
        
        .main-content h2 {
            scroll-margin-top: 12px;
        }
        
        .main-content h2:target {
            outline: 2px solid rgba(14, 165, 233, 0.35);
            outline-offset: 2px;
        }
        
        .article-head {
            padding-top: 4px;
            margin: 0;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--border);
        }
        
        .main-content h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            line-height: 1.35;
        }
        
        .date {
            color: var(--primary-dark);
            font-size: 0.75rem;
            padding: 4px 10px;
            background: rgba(14, 165, 233, 0.08);
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }
        
        .meta-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        
        .meta-tag {
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-muted);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 999px;
        }
        
        .meta-tag.is-ai {
            color: #047857;
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.25);
        }
        
        .main-content hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }
        
        .main-content h2 {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 18px 0 8px 0;
            padding: 8px 12px 8px 10px;
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.08) 0%, transparent 100%);
            border: 1px solid rgba(14, 165, 233, 0.12);
            border-radius: var(--radius-sm);
        }

        .source-section > h2 {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin: 0 0 10px;
            padding: 10px 12px;
            line-height: 1.4;
        }

        .source-section > h2::before {
            content: '';
            flex-shrink: 0;
            width: 4px;
            height: 1.1em;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 2px;
            margin-right: 2px;
        }

        .source-section:first-child > h2 {
            margin-top: 0;
        }
        
        .main-content blockquote {
            margin: 10px 0;
            padding: 10px 14px;
            border-left: 3px solid var(--secondary);
            background: var(--bg-muted);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            color: var(--text-secondary);
            font-size: 0.88rem;
        }
        
        .main-content code {
            font-size: 0.85em;
            padding: 1px 5px;
            background: #e2e8f0;
            border-radius: 4px;
            color: #0f172a;
        }
        
        .main-content h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 14px 0 6px 0;
        }
        
        .main-content a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: color 0.2s ease, border-color 0.2s ease;
        }
        
        .main-content a:hover {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        
        .main-content ul:not(.article-list):not(.toc-list),
        .main-content ol {
            margin: 8px 0;
            padding-left: 1.35em;
        }
        
        .main-content li:not(.article-item) {
            margin: 4px 0;
            line-height: 1.5;
            color: var(--text-secondary);
        }

        .main-content .article-list,
        .main-content .article-list .article-item {
            margin: 0;
            padding-left: 0;
            list-style: none;
        }
        
        .main-content li a {
            color: var(--primary-dark);
        }

        .daily-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin: 0 0 12px;
            padding: 10px 12px;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
        }

        .daily-filter-input,
        .daily-filter-select {
            border: 1px solid var(--border);
            background: #fff;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            color: var(--text-primary);
            padding: 6px 10px;
            outline: none;
        }

        .daily-filter-input {
            flex: 1;
            min-width: 160px;
        }

        .daily-filter-select {
            min-width: 140px;
            max-width: 220px;
        }

        .daily-filter-btn {
            border: 1px solid rgba(14, 165, 233, 0.25);
            background: rgba(14, 165, 233, 0.08);
            color: var(--primary-dark);
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 12px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        .daily-filter-btn:hover,
        .daily-filter-btn.is-active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: #fff;
        }

        .daily-filter-meta {
            width: 100%;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .daily-empty,
        .daily-filter-empty {
            text-align: center;
            padding: 24px 12px;
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        .daily-filter-empty {
            display: none;
        }

        .daily-feed {
            margin: 0;
        }

        .source-section {
            margin-bottom: 20px;
        }

        .source-section:last-child {
            margin-bottom: 0;
        }

        .source-section.is-hidden {
            display: none;
        }

        .source-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.5em;
            padding: 1px 8px;
            margin-left: 6px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--primary-dark);
            background: rgba(14, 165, 233, 0.12);
            border: 1px solid rgba(14, 165, 233, 0.18);
            border-radius: 999px;
            vertical-align: middle;
        }

        .article-list {
            list-style: none;
            margin: 0;
            padding: 0;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: #fff;
        }

        .article-item {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 10px 8px 12px;
            border-bottom: 1px solid rgba(226, 232, 240, 0.9);
            transition: background 0.2s ease;
        }

        .article-item:last-child {
            border-bottom: none;
        }

        .article-item:hover {
            background: rgba(14, 165, 233, 0.05);
        }

        .article-item.is-hidden {
            display: none;
        }

        .article-link {
            flex: 1;
            min-width: 0;
            display: block;
            line-height: 1.55;
            word-break: break-word;
        }

        .item-ai-jump {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            padding-top: 1px;
        }

        .item-ai-btn {
            border: 1px solid var(--border);
            background: #fff;
            font-size: 0.62rem;
            font-weight: 600;
            line-height: 1.2;
            padding: 4px 7px;
            border-radius: 999px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .item-ai-btn.item-ai-deepseek {
            color: #3b5bdb;
            border-color: rgba(77, 107, 254, 0.35);
            background: rgba(77, 107, 254, 0.08);
        }

        .item-ai-btn.item-ai-chatgpt {
            color: #0f766e;
            border-color: rgba(16, 185, 129, 0.35);
            background: rgba(16, 185, 129, 0.08);
        }

        .item-ai-btn.item-ai-gemini {
            color: #1d4ed8;
            border-color: rgba(59, 130, 246, 0.35);
            background: rgba(59, 130, 246, 0.08);
        }

        .item-ai-btn:hover {
            box-shadow: var(--shadow-sm);
        }

        .item-ai-btn.item-ai-deepseek:hover {
            background: rgba(77, 107, 254, 0.16);
        }

        .item-ai-btn.item-ai-chatgpt:hover {
            background: rgba(16, 185, 129, 0.18);
        }

        .item-ai-btn.item-ai-gemini:hover {
            background: rgba(59, 130, 246, 0.14);
        }

        .cve-badge {
            display: inline-block;
            margin-right: 4px;
            padding: 1px 6px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #b45309;
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 999px;
            vertical-align: middle;
        }
        
        .main-content p {
            margin: 6px 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .main-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 0.82rem;
        }
        
        .main-content th,
        .main-content td {
            border: 1px solid var(--border);
            padding: 6px 8px;
            text-align: left;
        }
        
        .main-content th {
            background: var(--bg-muted);
            color: var(--text-primary);
            font-weight: 600;
        }
        
        .stats-line {
            margin: 0 0 14px;
            padding: 8px 12px;
            text-align: center;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.06) 0%, rgba(6, 182, 212, 0.04) 100%);
            border: 1px solid rgba(14, 165, 233, 0.15);
            border-left: 3px solid var(--primary);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-weight: 500;
        }
        
        .stat-separator {
            margin: 0 12px;
            color: var(--text-muted);
        }
        
        .tag-cloud {
            position: fixed;
            right: 16px;
            top: 16px;
            width: var(--sidebar-width);
            max-height: 38vh;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            z-index: 999;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .tag-cloud.has-ai-summary {
            top: auto;
            bottom: 72px;
            max-height: calc(36vh - 24px);
        }
        
        .tag-cloud-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #0369a1 100%);
            color: #fff;
            padding: 8px 10px;
            font-weight: 600;
            font-size: 0.78rem;
            text-align: center;
            box-shadow: 0 2px 8px var(--glow-primary);
        }
        
        .tag-cloud-content {
            padding: 10px;
            overflow-y: auto;
            flex: 1;
            text-align: center;
            line-height: 1.45;
        }
        
        .tag-cloud-content::-webkit-scrollbar { width: 5px; }
        .tag-cloud-content::-webkit-scrollbar-track { background: var(--bg-muted); }
        .tag-cloud-content::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }
        
        .tag-cloud-item {
            display: inline-block;
            margin: 2px 3px;
            padding: 2px 8px;
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-radius: 999px;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            font-weight: 400;
            cursor: pointer;
            transition: border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
        }
        
        .tag-cloud-item:hover {
            border-color: rgba(14, 165, 233, 0.5);
            color: var(--primary-dark);
            box-shadow: 0 2px 6px var(--glow-primary);
        }
        
        .tag-cloud-item.tag-size-1 { font-size: 0.7em; opacity: 0.65; }
        .tag-cloud-item.tag-size-2 { font-size: 0.75em; opacity: 0.75; }
        .tag-cloud-item.tag-size-3 { font-size: 0.8em; opacity: 0.85; }
        .tag-cloud-item.tag-size-4 { font-size: 0.85em; }
        .tag-cloud-item.tag-size-5 { font-size: 0.9em; font-weight: 500; }
        .tag-cloud-item.tag-size-6 { font-size: 0.95em; font-weight: 600; color: var(--primary-dark); }
        
        .footer {
            margin-top: 24px;
            padding-top: 14px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.78rem;
            border-top: 1px solid var(--border);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .footer-links a {
            color: var(--primary-dark);
            text-decoration: none;
            padding: 3px 8px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(14, 165, 233, 0.25);
            background: rgba(14, 165, 233, 0.06);
            font-size: 0.74rem;
            font-weight: 500;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .footer-links a:hover {
            color: #fff;
            background: var(--primary);
            border-color: var(--primary);
        }

        .footer-links span {
            color: var(--border);
        }
        
        .ai-summary-panel {
            position: fixed;
            right: 16px;
            top: 16px;
            width: var(--sidebar-width);
            max-height: 78vh;
            background: var(--bg-card);
            border: 1px solid rgba(14, 165, 233, 0.25);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255, 255, 255, 0.05);
            z-index: 1000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .ai-summary-header {
            background: linear-gradient(135deg, #0284c7 0%, #0891b2 50%, #0d9488 100%);
            color: #fff;
            padding: 10px 12px;
            font-weight: 600;
            font-size: 0.85rem;
            box-shadow: 0 2px 10px var(--glow-primary);
            cursor: move;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .ai-summary-close {
            cursor: pointer;
            font-size: 1.35rem;
            line-height: 1;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: background 0.2s ease;
        }
        
        .ai-summary-close:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .ai-summary-content {
            padding: 12px 14px;
            overflow-y: auto;
            flex: 1;
            font-size: 0.82rem;
            line-height: 1.5;
            color: var(--text-secondary);
        }
        
        .ai-summary-content::-webkit-scrollbar { width: 6px; }
        .ai-summary-content::-webkit-scrollbar-track { background: var(--bg-muted); }
        .ai-summary-content::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }
        
        .ai-summary-content h3 {
            color: var(--text-primary);
            margin-top: 0;
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        
        .ai-summary-content ul {
            margin: 12px 0;
            padding-left: 1.25em;
        }
        
        .ai-summary-content li { margin: 6px 0; }
        
        .ai-summary-toggle {
            position: fixed;
            right: 16px;
            bottom: 16px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            width: 40px;
            height: 40px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            z-index: 999;
            display: none;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        
        .ai-summary-toggle:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .back-to-top {
            position: fixed;
            bottom: 64px;
            right: 16px;
            width: 40px;
            height: 40px;
            background: var(--secondary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1.25rem;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            z-index: 998;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        
        .back-to-top:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .back-to-top.has-ai-toggle { bottom: 64px; }
        
        @media (max-width: 1280px) {
            :root { --sidebar-width: 240px; }
            .container { max-width: 100%; }
        }
        
        @media (max-width: 768px) {
            body:has(.tag-cloud) .container,
            body:has(.ai-summary-panel) .container {
                padding-right: 12px;
            }
            .container { padding: 12px 12px 24px; }
            .navigation { align-items: stretch; }
            .nav-search {
                width: 100%;
                max-width: none;
                margin-left: 0;
            }
            .main-content {
                margin-right: 0;
                padding: 14px 16px;
            }
            .article-layout,
            .article-layout.has-toc {
                grid-template-columns: 1fr;
            }
            .article-layout.has-toc .toc-panel,
            .article-layout.has-toc .main-body {
                grid-column: 1;
                grid-row: auto;
            }
            .toc-panel {
                position: static;
                max-height: none;
            }
            .toc-list {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }
            .toc-list li { flex: 0 0 auto; }
            .toc-list a {
                border: 1px solid var(--border);
                border-left: 1px solid var(--border);
                white-space: nowrap;
            }
            .main-content h1 { font-size: 1.15rem; }
            .article-item {
                flex-wrap: wrap;
            }
            .item-ai-jump {
                width: 100%;
                justify-content: flex-end;
                padding-top: 4px;
            }
            .ai-summary-panel,
            .tag-cloud {
                width: calc(100% - 32px);
                right: 16px;
                left: 16px;
                max-height: 65vh;
                top: 16px;
            }
            .tag-cloud.has-ai-summary {
                top: auto;
                bottom: 16px;
            }
            .ai-summary-toggle { display: block; }
            .back-to-top {
                bottom: 24px;
                right: 16px;
                width: 44px;
                height: 44px;
            }
            .back-to-top.has-ai-toggle { bottom: 60px; }
        }
    </style>

<body>
    <div class="container">
        <div class="navigation">
            <span class="nav-brand">SECDaily</span>
            <a class="nav-back" href="../index.html">返回首页</a>

            <a class="nav-external" href="https://github.com/shellsec/SECDaily" target="_blank" rel="noopener noreferrer" title="SECDaily 开源仓库">GitHub</a>
            <form class="nav-search" id="navSearchForm">
                <input type="search" id="navSearchInput" placeholder="全站标题搜索..." autocomplete="off" aria-label="全站标题搜索">
                <button type="submit">搜索</button>

        </div>
        
        <div class="main-content">
            <div class="read-progress" aria-hidden="true"><div class="read-progress-bar" id="readProgress"></div></div>
            <div class="article-layout" id="articleLayout">
                <header class="article-head">
                    <h1>README</h1>
                    <div class="date">📅 资讯日期: README</div>
                    <div class="meta-tags">
                        <span class="meta-tag">安全日报</span>
                        <span class="meta-tag">0 篇文章</span>

                    </div>
                </header>
                <aside class="toc-panel" id="tocPanel" hidden>
                    <div class="toc-head">来源导航</div>
                    <ul class="toc-list" id="tocList"></ul>
                </aside>
                <div class="main-body" id="mainBody">
                    <div class="daily-toolbar" id="dailyToolbar">
                        <input type="search" class="daily-filter-input" id="articleFilter" placeholder="筛选标题或 CVE..." autocomplete="off" aria-label="筛选文章标题">
                        <select class="daily-filter-select" id="sourceFilter" aria-label="筛选来源">
                            <option value="">全部来源</option>
                        </select>
                        <button type="button" class="daily-filter-btn" id="cveOnlyBtn">仅 CVE</button>
                        <button type="button" class="daily-filter-btn" id="clearFilterBtn">清除</button>
                        <span class="daily-filter-meta" id="filterMeta"></span>
                    </div>
                    <div class="stats-line">
    <span>0 篇文章</span>
    <span class="stat-separator">|</span>
    <span>0 个来源</span>
    <span class="stat-separator">|</span>

</div><p class="daily-empty">今日暂无安全资讯更新</p>
                    <div class="daily-filter-empty" id="dailyFilterEmpty">没有匹配的文章，请调整筛选条件</div>
                    <div class="footer">
                        <p>Generated by SECDaily - 2026 · 页面更新 2026-05-28 12:28:55</p>
                        <div class="footer-links">
                            <a href="https://github.com/shellsec/SECDaily" target="_blank" rel="noopener noreferrer">GitHub 仓库</a>

    </div>
    
    
    
    
    
    <!-- 回到顶部按钮 -->
    <button class="back-to-top" id="backToTop" onclick="scrollToTop()" title="回到顶部" aria-label="回到顶部">↑</button>
    
    <script>
        // 拖拽功能
        let isDragging = false;
        let currentX;
        let currentY;
        let initialX;
        let initialY;
        let xOffset = 0;
        let yOffset = 0;
        
        const panel = document.getElementById('aiSummaryPanel');
        const toggle = document.getElementById('aiSummaryToggle');
        
        if (panel) {
            const header = panel.querySelector('.ai-summary-header');
            
            header.addEventListener('mousedown', dragStart);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', dragEnd);
        }
        
        function dragStart(e) {
            if (e.target.classList.contains('ai-summary-close')) {
                return;
            }
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
            
            if (e.target === header || header.contains(e.target)) {
                isDragging = true;
            }
        }
        
        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
                
                xOffset = currentX;
                yOffset = currentY;
                
                setTranslate(currentX, currentY, panel);
            }
        }
        
        function dragEnd(e) {
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
        }
        
        function setTranslate(xPos, yPos, el) {
            el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`;
        }
        
        // 显示/隐藏功能
        function toggleSummary() {
            if (panel) {
                if (panel.style.display === 'none' || panel.style.display === '') {
                    panel.style.display = 'flex';
                    if (toggle) toggle.textContent = '🤖';
                } else {
                    panel.style.display = 'none';
                    if (toggle) toggle.textContent = '🤖';
                }
            }
        }
        
        // 响应式处理：窗口大小改变时调整
        function handleResize() {
            if (window.innerWidth <= 768) {
                // 移动端：默认隐藏，显示切换按钮
                if (panel && panel.style.display !== 'none') {
                    // 如果当前显示，可以选择隐藏或保持显示
                    // 这里保持当前状态，不强制隐藏
                }
            } else {
                // 桌面端：默认显示
                if (panel && panel.style.display === 'none') {
                    panel.style.display = 'flex';
                }
            }
        }
        
        // 监听窗口大小改变
        window.addEventListener('resize', handleResize);
        
        // 移动端初始状态：默认隐藏
        if (window.innerWidth <= 768) {
            if (panel) {
                panel.style.display = 'none';
            }
        }
        
        // 回到顶部功能
        const backToTopBtn = document.getElementById('backToTop');
        const aiSummaryToggle = document.getElementById('aiSummaryToggle');
        
        // 检查是否有AI总结按钮，调整回到顶部按钮位置
        if (aiSummaryToggle && backToTopBtn) {
            backToTopBtn.classList.add('has-ai-toggle');
        }
        
        // 调整标签云位置（如果有AI总结）
        const tagCloud = document.getElementById('tagCloud');
        if (tagCloud && panel) {
            // 如果AI总结面板存在，标签云会自动通过CSS类调整位置
            // 这里可以添加额外的JavaScript逻辑如果需要
        }
        
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        (function initNavSearch() {
            const form = document.getElementById('navSearchForm');
            const input = document.getElementById('navSearchInput');
            if (!form || !input) return;
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const query = input.value.trim();
                if (!query) {
                    window.location.href = '../index.html';
                    return;
                }
                window.location.href = '../index.html?mode=title&q=' + encodeURIComponent(query);
            });
        })();

        (function initItemAiJump() {
            const buildPrompt = (meta) => {
                const lines = [
                    '你是资深网络安全分析助手。以下是一条来自 SECDaily 安全资讯聚合的单条资讯（含标题与原文链接）。',
                    '请优先结合原文链接内容分析；若无法访问原文，请基于标题合理推断，并明确标注「仅凭标题推断」的部分。',
                    '',
                    '【资讯元数据】',
                    meta.source ? `- 来源：${meta.source}` : null,
                    meta.date ? `- 日期：${meta.date}` : null,
                    meta.hasCve ? '- 标题含 CVE 标记：是（请重点核查漏洞编号、影响版本与修复状态）' : null,
                    `- 标题：${meta.title}`,
                    meta.url ? `- 原文链接：${meta.url}` : '- 原文链接：（无外链，仅按标题分析）',
                    '',
                    '【请完成以下分析】',
                    '1. 事件定性：漏洞/CVE、网络攻击、数据泄露、供应链、钓鱼社工、合规监管、威胁情报或其他？',
                    '2. 核心事实：发生了什么、涉及谁/哪家厂商/哪类产品、时间线（若可推断）',
                    '3. 威胁与技术：攻击手法、利用条件、是否 0day/在野利用、相关 CVE 编号与严重级别（CVSS 逻辑）',
                    '4. 影响评估：风险等级（高/中/低）及理由；受影响行业、资产类型、典型受害面',
                    '5. 防守与响应：检测思路（日志/IOC/行为）、缓解与加固、补丁/配置、是否建议启动应急响应',
                    '6. 关联延伸：与近期热点（APT、勒索、AI 安全、供应链等）是否相关；建议持续跟踪的关键词',
                    '7. 阅读建议：是否值得点开原文深读；预计阅读价值（高/中/低）',
                    '',
                    '【输出要求】',
                    '- 使用 Markdown，先给 TL;DR（3 条以内要点），再分节展开',
                    '- 结论具体、可执行，避免空泛套话；不确定处请写明假设',
                ];
                return lines.filter((line) => line !== null).join('\n');
            };

            const copyTextSync = (text) => {
                if (!text) return false;
                try {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.setAttribute('readonly', '');
                    ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0';
                    document.body.appendChild(ta);
                    ta.focus();
                    ta.select();
                    ta.setSelectionRange(0, text.length);
                    const ok = document.execCommand('copy');
                    document.body.removeChild(ta);
                    return ok;
                } catch (e) {
                    return false;
                }
            };

            const copyText = async (text) => {
                if (copyTextSync(text)) return true;
                if (navigator.clipboard && window.isSecureContext) {
                    try {
                        await navigator.clipboard.writeText(text);
                        return true;
                    } catch (e) {
                        return false;
                    }
                }
                return false;
            };

            document.addEventListener('click', async (e) => {
                const btn = e.target.closest('.item-ai-btn');
                if (!btn) return;
                e.preventDefault();
                e.stopPropagation();

                const title = btn.dataset.articleTitle || '';
                const url = (btn.dataset.articleUrl || '').replace(/&amp;/g, '&');
                if (!title) return;

                const dailyDate = document.querySelector('.article-head .date, .date')?.textContent?.trim() || '';
                const meta = {
                    title,
                    url,
                    source: btn.dataset.articleSource || '',
                    date: btn.dataset.articleDate || dailyDate,
                    hasCve: btn.dataset.articleCve === 'true',
                };
                const prompt = buildPrompt(meta);
                let copied = copyTextSync(prompt);
                if (!copied) {
                    copied = await copyText(prompt);
                }
                const kind = btn.dataset.ai;
                const shortHint = [
                    '请按我剪贴板中的 SECDaily 单条安全资讯分析提示词执行：',
                    '事件定性、威胁技术、CVE/影响、防守响应、关联延伸、阅读建议；Markdown 输出，先 TL;DR。',
                ].join('');
                let openUrl = 'https://gemini.google.com/app';
                if (kind === 'deepseek') {
                    openUrl = 'https://chat.deepseek.com/';
                } else if (kind === 'chatgpt') {
                    openUrl = prompt.length <= 2400
                        ? 'https://chatgpt.com/?q=' + encodeURIComponent(prompt)
                        : 'https://chatgpt.com/?q=' + encodeURIComponent(shortHint);
                }

                const oldLabel = btn.textContent;
                btn.textContent = copied ? '已复制' : '复制失败';
                btn.disabled = true;
                setTimeout(() => {
                    btn.textContent = oldLabel;
                    btn.disabled = false;
                }, copied ? 2000 : 2800);

                if (copied) {
                    window.open(openUrl, '_blank', 'noopener,noreferrer');
                } else {
                    window.prompt('复制未成功，请手动全选复制以下分析提示词：', prompt);
                }
            });
        })();
        
        (function initDailyFilter() {
            const mainBody = document.getElementById('mainBody');
            const filterInput = document.getElementById('articleFilter');
            const sourceFilter = document.getElementById('sourceFilter');
            const cveOnlyBtn = document.getElementById('cveOnlyBtn');
            const clearFilterBtn = document.getElementById('clearFilterBtn');
            const filterMeta = document.getElementById('filterMeta');
            const filterEmpty = document.getElementById('dailyFilterEmpty');
            const feed = document.getElementById('dailyFeed');
            if (!feed || !filterInput) return;

            const sections = [...feed.querySelectorAll('.source-section')];
            let cveOnly = false;

            sections.forEach((section) => {
                const sourceName = section.dataset.source || '';
                if (sourceFilter && sourceName) {
                    const option = document.createElement('option');
                    option.value = sourceName;
                    option.textContent = sourceName.length > 28 ? sourceName.slice(0, 28) + '…' : sourceName;
                    option.title = sourceName;
                    sourceFilter.appendChild(option);
                }
            });

            const applyFilter = () => {
                const query = filterInput.value.trim().toLowerCase();
                const selectedSource = sourceFilter ? sourceFilter.value : '';
                let visibleArticles = 0;
                let visibleSections = 0;

                sections.forEach((section) => {
                    const sourceName = section.dataset.source || '';
                    const items = [...section.querySelectorAll('.article-item')];
                    let sectionVisible = 0;

                    items.forEach((item) => {
                        const title = item.dataset.title || item.textContent.toLowerCase();
                        const matchQuery = !query || title.includes(query);
                        const matchSource = !selectedSource || sourceName === selectedSource;
                        const matchCve = !cveOnly || item.classList.contains('is-cve');
                        const show = matchQuery && matchSource && matchCve;
                        item.classList.toggle('is-hidden', !show);
                        if (show) sectionVisible++;
                    });

                    const showSection = sectionVisible > 0;
                    section.classList.toggle('is-hidden', !showSection);
                    if (showSection) {
                        visibleSections++;
                        visibleArticles += sectionVisible;
                    }
                });

                if (filterMeta) {
                    filterMeta.textContent = query || selectedSource || cveOnly
                        ? `显示 ${visibleArticles} 篇文章 · ${visibleSections} 个来源`
                        : `共 ${sections.length} 个来源`;
                }
                if (filterEmpty) {
                    filterEmpty.style.display = visibleArticles === 0 ? 'block' : 'none';
                }
            };

            filterInput.addEventListener('input', applyFilter);
            if (sourceFilter) sourceFilter.addEventListener('change', applyFilter);
            if (cveOnlyBtn) {
                cveOnlyBtn.addEventListener('click', () => {
                    cveOnly = !cveOnly;
                    cveOnlyBtn.classList.toggle('is-active', cveOnly);
                    applyFilter();
                });
            }
            if (clearFilterBtn) {
                clearFilterBtn.addEventListener('click', () => {
                    filterInput.value = '';
                    if (sourceFilter) sourceFilter.value = '';
                    cveOnly = false;
                    if (cveOnlyBtn) cveOnlyBtn.classList.remove('is-active');
                    applyFilter();
                });
            }

            document.querySelectorAll('.tag-cloud-item').forEach((tag) => {
                tag.addEventListener('click', () => {
                    filterInput.value = tag.textContent.trim();
                    applyFilter();
                    document.getElementById('dailyToolbar')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            });

            applyFilter();
        })();

        (function initReadingEnhancements() {
            const mainBody = document.getElementById('mainBody');
            const tocPanel = document.getElementById('tocPanel');
            const tocList = document.getElementById('tocList');
            const articleLayout = document.getElementById('articleLayout');
            const progressBar = document.getElementById('readProgress');
            if (!mainBody) return;
            
            const headings = mainBody.querySelectorAll('h2');
            if (headings.length && tocList && tocPanel) {
                tocPanel.hidden = false;
                articleLayout.classList.add('has-toc');
                headings.forEach((heading, index) => {
                    const text = heading.textContent.trim();
                    if (!text) return;
                    let id = heading.id;
                    if (!id) {
                        id = 'section-' + index + '-' + text.replace(/\s+/g, '-').replace(/[^\w\u4e00-\u9fff-]/g, '').slice(0, 40);
                        heading.id = id;
                    }
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = '#' + id;
                    a.textContent = text.length > 28 ? text.slice(0, 28) + '…' : text;
                    a.title = text;
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
                    });
                    li.appendChild(a);
                    tocList.appendChild(li);
                });
                
                const tocLinks = tocList.querySelectorAll('a');
                const onScroll = () => {
                    let active = 0;
                    headings.forEach((h, i) => {
                        if (h.getBoundingClientRect().top <= 120) active = i;
                    });
                    tocLinks.forEach((link, i) => link.classList.toggle('is-active', i === active));
                };
                window.addEventListener('scroll', onScroll, { passive: true });
                onScroll();
            }
            
            if (progressBar) {
                window.addEventListener('scroll', () => {
                    const rect = mainBody.getBoundingClientRect();
                    const total = mainBody.scrollHeight - window.innerHeight;
                    const scrolled = Math.min(Math.max(-rect.top, 0), total);
                    const pct = total > 0 ? (scrolled / total) * 100 : 0;
                    progressBar.style.width = pct + '%';
                }, { passive: true });
            }
        })();
    </script>
